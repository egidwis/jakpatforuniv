<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Tidak Sesuai | Jakpat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    .success-icon-container {
      width: 160px;
      height: 160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .success-icon {
      width: 120px;
      height: 120px;
    }

    .success-icon circle.outer {
      stroke: #fee2e2;
      stroke-width: 4;
    }

    .success-icon circle.inner {
      stroke: #fca5a5;
      stroke-width: 2;
    }

    .success-icon path {
      stroke: #ef4444;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #475569;
      padding: 0 15px;
      max-width: 480px;
    }

    .message b {
      color: #334155;
      font-weight: 600;
    }

    .highlight-box {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 25px;
      font-size: 1.05rem;
      color: #334155;
    }

    .cta-button {
      background: #3b82f6;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 28px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease;
      display: inline-block;
      margin-top: 20px;
    }

    .cta-button:hover {
      background: #2563eb;
    }

    @media (max-width: 640px) {
      .success-title {
        font-size: 1.25rem;
        margin-bottom: 30px;
      }

      .success-icon-container {
        width: 140px;
        height: 140px;
      }

      .message {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="success-title">
      Terima Kasih Partisipasinya!
    </div>

    <!-- Info Icon -->
    <div class="success-icon-container">
      <svg class="success-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="outer" cx="50" cy="50" r="45" fill="none" />
        <circle class="inner" cx="50" cy="50" r="35" fill="none" />
        <path d="M50 30 L50 30.01 M50 45 L50 70" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <div class="message">
      Mohon maaf, <b>profil atau jawaban kamu belum sesuai</b> dengan kriteria khusus yang dicari pada survei ini.
      <div class="highlight-box">
        Jangan berkecil hati! Masih banyak survei seru lainnya menunggu kamu di <b>Aplikasi Jakpat</b>.
      </div>
      <button class="cta-button" onclick="closeWebView()">Tutup Halaman</button>
    </div>
  </div>

  <script>
    function closeWebView() {
      // 1. React Native WebView bridge (without return so it falls through!)
      try {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'close' }));
        }
      } catch (e) { }

      // 2. Try window.close()
      try {
        window.close();
      } catch (e) { }

      // 3. Try deep link scheme
      setTimeout(function () {
        window.location.href = 'jakpat://close';
      }, 300);

      // 4. Fallback: go back
      setTimeout(function () {
        if (!document.hidden) {
          window.history.back();
        }
      }, 800);
    }

    // Auto close after 10s as graceful fallback
    setTimeout(function () {
      closeWebView();
    }, 10000);
  </script>
</body>

</html>
