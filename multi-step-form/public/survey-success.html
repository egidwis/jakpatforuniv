<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Tersubmit | Jakpat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .success-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e293b;
      margin-top: 20px;
      margin-bottom: 50px;
    }

    .success-icon-container {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 50px;
    }

    .success-icon {
      width: 160px;
      height: 160px;
    }

    .success-icon circle.outer {
      stroke: #dbeafe;
      stroke-width: 4;
    }

    .success-icon circle.inner {
      stroke: #60a5fa;
      stroke-width: 2;
    }

    .success-icon path {
      stroke: #3b82f6;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #475569;
      padding: 0 15px;
      max-width: 480px;
    }

    .message b {
      color: #334155;
      font-weight: 600;
    }

    .highlight-box {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 25px;
      font-size: 1.05rem;
      color: #334155;
    }

    .cta-button {
      background: #3b82f6;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 16px 32px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease;
      width: 100%;
      max-width: 320px;
      display: inline-block;
    }

    .cta-button:hover {
      background: #2563eb;
    }

    @media (max-width: 640px) {
      .success-title {
        font-size: 1.25rem;
        margin-bottom: 40px;
      }

      .success-icon-container {
        width: 160px;
        height: 160px;
        margin-bottom: 40px;
      }

      .success-icon {
        width: 120px;
        height: 120px;
      }

      .message {
        font-size: 0.95rem;
        margin-bottom: 30px;
      }

      .cta-button {
        font-size: 0.95rem;
        padding: 14px 28px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="success-title" style="font-size: x-large;">
      Jawaban Tersimpan!
    </div>

    <!-- Success Icon -->
    <div class="success-icon-container">
      <svg class="success-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="outer" cx="50" cy="50" r="45" fill="none" />
        <circle class="inner" cx="50" cy="50" r="35" fill="none" />
        <path d="M30 50 L45 65 L70 35" fill="none" />
      </svg>
    </div>

    <div class="message">
      Jika profilmu sesuai dengan kriteria yang kami butuhkan, kamu berkesempatan mendapatkan <b>hadiah E-Wallet</b>
      yang akan diundi setiap akhir bulan.
      <div class="highlight-box">
        Tunggu pengumuman pemenang undian dari kami dan buka terus <b>Aplikasi Jakpat</b> ya!
      </div>
    </div>

    <!-- Trigger the close intent for the App's Webview listener -->
    <a href="jakpat://close"
      onclick="try{window.ReactNativeWebView.postMessage(JSON.stringify({action:'close'}))}catch(e){}"
      class="cta-button">
      Kembali ke Beranda App
    </a>
  </div>

  <script>
    // Set auto close timer to gracefully exit if webview bridges take too long manually
    setTimeout(() => {
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'close' }));
      } catch (e) { }
    }, 10000);
  </script>
</body>

</html>
